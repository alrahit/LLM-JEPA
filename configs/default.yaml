# Default configuration for LLM-JEPA

model:
  name: \"llama2-7b\"
  pretrained: true

training:
  epochs: 4
  batch_size: 16
  learning_rate: 2e-5
  warmup_steps: 100
  weight_decay: 0.01

jepa:
  enabled: true
  lambda: 0.5
  predictor_dim: 512

data:
  dataset: \"spider\"
  max_length: 512
  num_workers: 4

logging:
  wandb_project: \"llm-jepa\"
  log_interval: 10
  save_interval: 100
